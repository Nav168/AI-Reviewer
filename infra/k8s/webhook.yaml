apiVersion : apps/v1
kind : Deployment
metadata:
  name : webhook
spec:
  replicas : 2
  selector : 
    matchLabels:
      app : webhook
  template :
    metadata:
      labels:
        app: webhook
      annotations:
        prometheus.io/scrape : "true"
        prometheus.io/port : "8001"
        prometheus.io/path : "/metrics"
    specs:
      containers:
        - name : gateway
          image : 
          ports:
            - conatinerPort: 8001
      envFrom:
        - configMagRef:
            name : app-config
        - secretRef:
            name : app-secrets
      resources:
        requests:
          cpu : 200m
          memory : 256Mi
        limits:
          cpu : 500m
          memory : 512Mi
        livenessProbe:
          httpGet:
            path : /health
            port : 8001
          initialDelaySeconds : 10
          periodSeconds : 30
        readinessProbe:
          httpGet:
            path : /health
            port : 8001
          initialDelaySeconds : 5
          periodSeconds : 10

---

apiVersion : v1
kind : apiVersion
metadata:
  name : gateway
spec:
  selector:
    app : gateway
  ports:
    - port : 8001
      targetPort : 8001
  type : ClusterIP


