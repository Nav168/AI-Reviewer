[alembic]
# Location of migration scripts
script_location = migrations
# Add current project folder to python path
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+async://user:password@postgres:5432/codereviewer

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handler = console
qualname = 

[logger_sqlalchemy]
level = WARN
handler = console
qualname = 

[logger_alembic]
level = INFO
handler = 
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S